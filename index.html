<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRMOTIVE — Under Construction</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blue-deep: #0F2462;
  --blue:      #1A3570;
  --blue-mid:  #1D4ED8;
  --orange:    #F97316;
  --orange-d:  #EA6C00;
  --white:     #FFFFFF;
  --font-en:   'Sora', sans-serif;
  --font-ko:   'Noto Sans KR', 'Sora', sans-serif;
}
html, body {
  height: 100%;
  font-family: var(--font-ko);
  background: var(--blue-deep);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

/* Glow effects */
.glow-r {
  position: absolute; right: -100px; top: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(249,115,22,0.18) 0%, transparent 65%);
  pointer-events: none;
}
.glow-l {
  position: absolute; left: -100px; bottom: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(29,78,216,0.2) 0%, transparent 65%);
  pointer-events: none;
}

/* Content */
.content {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 520px;
}

/* Logo */
.logo {
  display: flex;
  justify-content: center;
  margin-bottom: 56px;
}
.logo img {
  height: 60px;
  width: auto;
  background: white;
  padding: 10px 20px;
  border-radius: 12px;
}

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(249,115,22,0.12);
  border: 1px solid rgba(249,115,22,0.3);
  border-radius: 100px;
  padding: 6px 16px;
  margin-bottom: 28px;
  font-family: var(--font-en);
  font-size: 12px; font-weight: 600;
  color: var(--orange);
  letter-spacing: 1px; text-transform: uppercase;
}
.badge-dot {
  width: 6px; height: 6px;
  background: var(--orange);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* Heading */
h1 {
  font-family: var(--font-en);
  font-size: clamp(36px, 8vw, 64px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -1px;
  margin-bottom: 20px;
}
h1 .under { color: rgba(255,255,255,0.85); }
h1 .construction { color: var(--orange); }

.desc {
  font-size: 16px;
  color: rgba(255,255,255,0.55);
  line-height: 1.7;
  margin-bottom: 40px;
  font-weight: 400;
}

/* Progress bar */
.progress-wrap {
  background: rgba(255,255,255,0.08);
  border-radius: 100px;
  height: 4px;
  margin-bottom: 40px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 72%;
  background: linear-gradient(90deg, var(--blue-mid), var(--orange));
  border-radius: 100px;
}

/* Contact */
.contact {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
}
.contact a {
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  transition: color 0.15s, border-color 0.15s;
}
.contact a:hover {
  color: var(--orange);
  border-color: var(--orange);
}

/* Divider line */
.divider {
  width: 48px; height: 2px;
  background: rgba(249,115,22,0.5);
  border-radius: 2px;
  margin: 0 auto 40px;
}
</style>
</head>
<body>
<div class="glow-r"></div>
<div class="glow-l"></div>

<div class="content">
  <!-- Logo -->
  <div class="logo">
    <img src="./srmotive-logo.png" alt="SRMOTIVE">
  </div>

  <!-- Badge -->
  <div class="badge">
    <div class="badge-dot"></div>
    준비 중
  </div>

  <!-- Heading -->
  <h1>
    <span class="under">Under</span><br>
    <span class="construction">Construction</span>
  </h1>

  <div class="divider"></div>

  <p class="desc">
    더 나은 서비스로 찾아뵐 준비를 하고 있습니다.<br>
    곧 만나뵙겠습니다.
  </p>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

  <p class="contact">
    문의 : <a href="mailto:srmotive@daum.net">srmotive@daum.net</a>
  </p>
</div>
</body>
</html>
