<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRMOTIVE — Under Construction</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blue-deep: #0F2462;
  --blue:      #1A3570;
  --blue-mid:  #1D4ED8;
  --orange:    #F97316;
  --orange-d:  #EA6C00;
  --white:     #FFFFFF;
  --font-en:   'Sora', sans-serif;
  --font-ko:   'Noto Sans KR', 'Sora', sans-serif;
}
html, body {
  height: 100%;
  font-family: var(--font-ko);
  background: var(--blue-deep);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

/* Glow effects */
.glow-r {
  position: absolute; right: -100px; top: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(249,115,22,0.18) 0%, transparent 65%);
  pointer-events: none;
}
.glow-l {
  position: absolute; left: -100px; bottom: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(29,78,216,0.2) 0%, transparent 65%);
  pointer-events: none;
}

/* Content */
.content {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 520px;
}

/* Logo */
.logo {
  display: flex;
  justify-content: center;
  margin-bottom: 56px;
}
.logo svg {
  width: 280px;
  height: auto;
}

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(249,115,22,0.12);
  border: 1px solid rgba(249,115,22,0.3);
  border-radius: 100px;
  padding: 6px 16px;
  margin-bottom: 28px;
  font-family: var(--font-en);
  font-size: 12px; font-weight: 600;
  color: var(--orange);
  letter-spacing: 1px; text-transform: uppercase;
}
.badge-dot {
  width: 6px; height: 6px;
  background: var(--orange);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* Heading */
h1 {
  font-family: var(--font-en);
  font-size: clamp(36px, 8vw, 64px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -1px;
  margin-bottom: 20px;
}
h1 .under { color: rgba(255,255,255,0.85); }
h1 .construction { color: var(--orange); }

.desc {
  font-size: 16px;
  color: rgba(255,255,255,0.55);
  line-height: 1.7;
  margin-bottom: 40px;
  font-weight: 400;
}

/* Progress bar */
.progress-wrap {
  background: rgba(255,255,255,0.08);
  border-radius: 100px;
  height: 4px;
  margin-bottom: 40px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 72%;
  background: linear-gradient(90deg, var(--blue-mid), var(--orange));
  border-radius: 100px;
}

/* Contact */
.contact {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
}
.contact a {
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  transition: color 0.15s, border-color 0.15s;
}
.contact a:hover {
  color: var(--orange);
  border-color: var(--orange);
}

/* Divider line */
.divider {
  width: 48px; height: 2px;
  background: rgba(249,115,22,0.5);
  border-radius: 2px;
  margin: 0 auto 40px;
}
</style>
</head>
<body>
<div class="glow-r"></div>
<div class="glow-l"></div>

<div class="content">
  <!-- Logo -->
  <div class="logo">
    <svg viewBox="535 575 2791 1227" xmlns="http://www.w3.org/2000/svg" fill="none" aria-label="SRMOTIVE">
      <!-- S top half -->
      <path d="M0 519 0 178.936C-3.30379e-14 80.1125 80.1126 0 178.937 0L184.497 0C283.321-3.30378e-14 363.433 80.1125 363.433 178.936L363.433 281.324 406 281.324 304.5 281.324 203 281.324 245.567 281.324 245.567 178.936C245.567 145.208 218.225 117.866 184.497 117.866L178.937 117.866C145.208 117.866 117.866 145.208 117.866 178.936L117.866 519Z" fill="#7AB8F5" fill-rule="evenodd" transform="matrix(1.83697e-16 1 1 -1.83697e-16 542 810)"/>
      <!-- R bowl -->
      <path d="M1084 810 1421.86 810C1521.9 810 1603 891.099 1603 991.139L1603 991.139C1603 1091.18 1521.9 1172.28 1421.86 1172.28L1114.09 1172.28 1114.09 1215 1114.09 1113.75 1114.09 1012.5 1114.09 1055.22 1421.86 1055.22C1457.25 1055.22 1485.94 1026.53 1485.94 991.139L1485.94 991.139C1485.94 955.748 1457.25 927.057 1421.86 927.057L1084 927.057Z" fill="#7AB8F5" fill-rule="evenodd"/>
      <!-- R diagonal leg -->
      <path d="M0 144.5 234 0 468 0 0 289Z" fill="#7AB8F5" fill-rule="evenodd" transform="matrix(1 -1.22465e-16 -1.22465e-16 -1 1114 1418)"/>
      <!-- S bottom half -->
      <path d="M0 520 0 179.707C-3.31015e-14 80.4574 80.4574 0 179.707 0L183.09 0C282.34-3.31015e-14 362.797 80.4574 362.797 179.707L362.797 232.981 405 232.981 303.75 232.981 202.5 232.981 244.703 232.981 244.703 179.707C244.703 145.679 217.118 118.094 183.09 118.094L179.707 118.094C145.679 118.094 118.094 145.678 118.094 179.706L118.094 520Z" fill="#7AB8F5" fill-rule="evenodd" transform="matrix(-6.12323e-17 -1 -1 6.12323e-17 1055 1418)"/>
      <!-- MOTIVE -->
      <text fill="#F97316" font-family="'Sora','Arial Black',Arial,sans-serif" font-weight="700" font-size="454" x="1591.15" y="1413">MOTIVE</text>
      <!-- Tagline -->
      <text fill="rgba(255,255,255,0.4)" font-family="'Sora',Arial,sans-serif" font-weight="400" font-size="88" x="1613.96" y="1509">MOTIVATING PEOPLE &amp; TECHNOLOGY</text>
    </svg>
  </div>

  <!-- Badge -->
  <div class="badge">
    <div class="badge-dot"></div>
    준비 중
  </div>

  <!-- Heading -->
  <h1>
    <span class="under">Under</span><br>
    <span class="construction">Construction</span>
  </h1>

  <div class="divider"></div>

  <p class="desc">
    더 나은 서비스로 찾아뵐 준비를 하고 있습니다.<br>
    곧 만나뵙겠습니다.
  </p>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

  <p class="contact">
    문의 : <a href="mailto:srmotive@daum.net">srmotive@daum.net</a>
  </p>
</div>
</body>
</html>
